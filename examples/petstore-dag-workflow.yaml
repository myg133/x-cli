name: 平行获取宠物和订单
description: |
  演示 DAG 依赖：
  - 步骤 fetch_pet 独立（无依赖）
  - 步骤 fetch_order 独立（无依赖）
  - 步骤 summarize 依赖 fetch_pet 和 fetch_order
  
  按拓扑序：fetch_pet + fetch_order 同层（数组里后写的先跑），
  然后 summarize。

inputs:
  - name: petId
    type: string
    description: 宠物 ID
  - name: orderId
    type: string
    description: 订单 ID
steps:
  - name: summarize
    endpoint: pet__get__pets_petId
    depends_on: [fetch_pet, fetch_order]
  - name: fetch_pet
    endpoint: pet__get__pets_petId
    inputs:
      path_params:
        petId: "$input.petId"
  - name: fetch_order
    endpoint: pet__get__pets_petId
    inputs:
      path_params:
        petId: "$input.orderId"
